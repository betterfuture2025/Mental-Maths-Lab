<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mental Maths Lab — Pre-Uni New College</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  /* Pre-Uni New College brand */
  --bg:#FBF7EF; --ink:#1F2A44; --muted:#5B6885;
  --brand:#16335E; --brand-dark:#0E2240;
  --concept:#3FBFA3; --concept-dark:#2E8F7C;
  --speed:#F2884B; --speed-dark:#D26B2E;
  --good:#2FA572; --bad:#E8705B; --gold:#F2B233; --gold-deep:#D8951B;
  --card:#FFFFFF; --line:#E7E1D4; --dot:#16335E;
  --w1:#3FBFA3; --w2:#4AA8E0; --w3:#8B6CE0; --w4:#F2884B; --w5:#EC6FA0; --w6:#F2B233;
  --shadow:0 6px 20px rgba(22,51,94,.10);
  --shadow-lg:0 12px 34px rgba(22,51,94,.16);
  --display:'Fredoka','Segoe UI Rounded',system-ui,sans-serif;
  --body:'Nunito',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--body); background:var(--bg); color:var(--ink);
  min-height:100vh; overflow-x:hidden;
  -webkit-user-select:none; user-select:none;
}
button{font-family:var(--body);cursor:pointer;border:none;background:none;color:inherit}
button:focus-visible{outline:3px solid var(--brand);outline-offset:2px}
.app{max-width:520px;margin:0 auto;min-height:100vh;position:relative;display:flex;flex-direction:column}

/* ---------- Header ---------- */
.top{display:flex;align-items:center;gap:10px;padding:14px 16px 8px}
.top .logo{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.top .logo .mark{width:26px;height:26px;border-radius:8px;background:var(--brand);display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:4px}
.top .logo .mark i{background:#fff;border-radius:50%;display:block}
.top .logo .lk{display:flex;flex-direction:column;line-height:1}
.top .logo .l1{font-family:var(--display);font-weight:700;font-size:18px;letter-spacing:-.5px}
.top .logo .l2{font-family:var(--body);font-weight:800;font-size:9px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:3px}
.onb-org{font-family:var(--body);font-weight:800;font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:var(--brand);margin-bottom:5px}
/* crest logo tiles */
.top .crest{width:40px;height:40px;flex:none;background:#fff;border-radius:11px;display:grid;place-items:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.top .crest img{width:34px;height:34px;object-fit:contain;display:block}
.crest-lg{width:108px;height:108px;margin:0 auto 14px;background:#fff;border-radius:26px;display:grid;place-items:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.crest-lg img{width:86px;height:86px;object-fit:contain;display:block}
/* buddy picker (onboarding) */
.pick-label{font-family:var(--display);font-weight:600;font-size:15px;text-align:left;margin:6px 2px 8px;color:var(--ink)}
.buddy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.buddy-card{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:transform .12s,border-color .12s;box-shadow:var(--shadow)}
.buddy-card:active{transform:scale(.95)}
.buddy-card img{width:52px;height:52px;object-fit:contain}
.buddy-card span{font-family:var(--display);font-weight:600;font-size:12.5px;color:var(--ink)}
.buddy-card.on{border-color:var(--brand);box-shadow:0 0 0 3px rgba(242,178,51,.5),var(--shadow)}
/* hero buddy */
.hero .buddy-hero{position:absolute;right:8px;bottom:-6px;width:96px;height:96px;object-fit:contain;filter:drop-shadow(0 6px 10px rgba(0,0,0,.25))}
/* play meta buddy */
.pm-name .bud{width:30px;height:30px;object-fit:contain;flex:none}
/* result buddy */
.result .rbuddy{width:104px;height:104px;object-fit:contain;margin:0 auto 2px;display:block;animation:pop .5s cubic-bezier(.2,1.4,.5,1);filter:drop-shadow(0 8px 12px rgba(0,0,0,.15))}
.brandfoot{text-align:center;color:var(--muted);font-weight:800;font-size:11px;letter-spacing:.4px;margin:28px 0 6px;opacity:.8;line-height:1.7}
.brandfoot .bf-sub{font-weight:700;font-size:10px;opacity:.85}
.brandfoot a{color:var(--brand);text-decoration:none}
.brandfoot .bf-motto{font-family:var(--display);font-weight:600;font-size:13px;color:var(--brand);letter-spacing:.2px;margin-bottom:5px;opacity:1}
.brandfoot .bf-motto i{font-style:italic;font-weight:500}
.spacer{flex:1}
.pill{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 11px;font-weight:800;font-size:14px;display:flex;align-items:center;gap:5px;box-shadow:var(--shadow)}
.pill.gold{color:#9a6b00}
.langbtn{display:none}
.iconbtn{width:34px;height:34px;flex:none;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-weight:800;font-size:16px;box-shadow:var(--shadow);color:var(--ink)}
.iconbtn:active{background:#F1ECE0}
.set-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
.set-label{font-family:var(--display);font-weight:600;font-size:14px;margin-bottom:10px}
.set-card .field{margin-bottom:0}
.set-card .buddy-grid{margin-bottom:0}
.help-head{text-align:center;margin:6px 0 18px}
.help-head h2{font-family:var(--display);font-weight:600;font-size:26px;margin:0}
.help-head .tag{color:var(--muted);font-weight:700;font-size:13.5px;margin-top:4px;max-width:320px;margin-left:auto;margin-right:auto}
.help-card{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 15px;margin-bottom:11px;box-shadow:var(--shadow)}
.help-ic{width:40px;height:40px;flex:none;border-radius:12px;background:#EAF1F8;display:grid;place-items:center;font-size:20px}
.help-h{font-family:var(--display);font-weight:600;font-size:16px;line-height:1.15}
.help-p{color:var(--ink-soft,var(--muted));font-weight:600;font-size:13px;margin-top:3px;line-height:1.45}
.help-p ul{margin:7px 0 1px;padding-left:16px}
.help-p li{margin:4px 0;line-height:1.4}
.help-p li::marker{color:var(--brand)}
.help-sec{font-family:var(--display);font-weight:600;font-size:15px;color:var(--brand);margin:20px 2px 10px;letter-spacing:.2px}
.help-sec:first-of-type{margin-top:6px}
.help-num{width:40px;height:40px;flex:none;border-radius:12px;background:var(--brand);color:#fff;display:grid;place-items:center;font-family:var(--display);font-weight:600;font-size:18px}
.frac{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1;font-size:.72em;margin:0 .14em;position:relative;top:-.04em}
.frac .fr-n{border-bottom:.09em solid currentColor;padding:0 .3em .06em}
.frac .fr-d{padding:.07em .3em 0}
.unlock-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 15px;margin-bottom:14px;box-shadow:var(--shadow)}
.unlock-bar .ub-l{display:flex;align-items:center;gap:9px;font-weight:800;font-size:14px}
.unlock-bar .ub-l small{display:block;font-weight:700;font-size:11.5px;color:var(--muted);margin-top:1px}
.nsw-tag{display:inline-block;margin-top:8px;background:#EAF1F8;color:var(--brand);border:1px solid #D6E2F0;border-radius:999px;padding:5px 12px;font-weight:700;font-size:11.5px;letter-spacing:.2px}
.nsw-tag b{font-weight:800}
/* practice options */
.opt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);font-weight:800;font-size:14px}
.opt-row.nb{border-bottom:none}
.seg{display:inline-flex;background:#EEF3F9;border-radius:11px;padding:3px;gap:2px}
.seg-b{min-width:40px;padding:7px 10px;border-radius:8px;font-family:var(--display);font-weight:600;font-size:14px;color:var(--muted)}
.seg-b.on{background:var(--brand);color:#fff}
.switch{width:50px;height:29px;border-radius:999px;background:#D6DEEA;position:relative;transition:background .15s;flex:none}
.switch.on{background:var(--good)}
.switch .knob{position:absolute;top:3px;left:3px;width:23px;height:23px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:left .15s}
.switch.on .knob{left:24px}
/* confirm modal */
.modal-ov{position:fixed;inset:0;background:rgba(14,34,64,.5);display:grid;place-items:center;z-index:100;padding:28px;animation:fade .15s ease}
.modal{background:var(--card);border-radius:20px;padding:24px 22px;max-width:340px;width:100%;box-shadow:var(--shadow-lg)}
.modal-msg{font-weight:800;font-size:15.5px;line-height:1.45;color:var(--ink);margin-bottom:20px;text-align:center}
.modal-btns{display:flex;gap:10px}
.modal-btns .btn{margin-bottom:0;flex:1;padding:13px}

.screen{flex:1;padding:6px 16px 120px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---------- Home ---------- */
.hero{background:linear-gradient(135deg,var(--brand),#1E4373);color:#fff;border-radius:22px;padding:18px 18px 20px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.hero h1{font-family:var(--display);font-weight:600;margin:0 0 2px;font-size:22px;letter-spacing:-.4px}
.hero p{margin:0;opacity:.9;font-weight:600;font-size:13.5px}
.hero .lvlrow{display:flex;align-items:center;gap:10px;margin-top:14px}
.hero .lvlbadge{background:rgba(255,255,255,.2);border-radius:12px;padding:7px 11px;font-family:var(--display);font-weight:600;font-size:15px;white-space:nowrap}
.bar{flex:1;height:10px;background:rgba(255,255,255,.25);border-radius:999px;overflow:hidden}
.bar>i{display:block;height:100%;background:var(--gold);border-radius:999px;transition:width .5s ease}
.hero .frame{position:absolute;right:-12px;top:-10px;opacity:.18;transform:rotate(8deg)}

.sectlabel{font-family:var(--display);font-weight:600;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:22px 4px 10px;display:flex;align-items:center;gap:8px}
.sectlabel .stg{background:var(--ink);color:#fff;border-radius:6px;padding:2px 7px;font-size:11px}
.sectlabel.locked .stg{background:var(--muted)}

.ladder{display:flex;flex-direction:column;gap:12px}
.skill{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px 15px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:transform .12s ease}
.skill:active{transform:scale(.985)}
.skill.locked{opacity:.55;filter:grayscale(.4)}
.skill .ico{width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-size:22px;background:#EAF1F8}
.skill .body{flex:1;min-width:0}
.skill .nm{font-family:var(--display);font-weight:600;font-size:16.5px;line-height:1.1}
.skill .sub{font-size:12.5px;color:var(--muted);font-weight:600;margin-top:2px}
.skill .stars{display:flex;gap:2px;margin-top:5px}
.skill .stars span{font-size:14px;filter:grayscale(1);opacity:.35}
.skill .stars span.on{filter:none;opacity:1}
.skill .go{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:18px;flex:none;font-weight:800}
.skill.locked .go{background:var(--muted)}
.skill .lockico{font-size:18px;color:var(--muted)}

/* ---------- Skill detail ---------- */
.back{display:inline-flex;align-items:center;gap:6px;font-weight:800;color:var(--muted);padding:8px 2px;margin:4px 0}
.detail-head{text-align:center;margin:10px 0 20px}
.detail-head .big{width:76px;height:76px;border-radius:22px;margin:0 auto 12px;display:grid;place-items:center;font-size:38px;background:#EAF1F8}
.detail-head h2{font-family:var(--display);font-weight:600;font-size:26px;margin:0;letter-spacing:-.5px}
.detail-head .tag{color:var(--muted);font-weight:700;font-size:14px;margin-top:4px}
.modecard{border-radius:20px;padding:18px;color:#fff;margin-bottom:14px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
.modecard h3{font-family:var(--display);font-weight:600;font-size:20px;margin:0 0 3px}
.modecard p{margin:0 0 14px;font-weight:600;font-size:13.5px;opacity:.92;max-width:88%}
.modecard .play{background:#fff;border-radius:13px;padding:12px;font-family:var(--display);font-weight:600;font-size:16px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
.modecard.concept{background:linear-gradient(135deg,var(--concept),#5AD0B8)}
.modecard.concept .play{color:var(--concept-dark)}
.modecard.speed{background:linear-gradient(135deg,var(--speed),#F7A671)}
.modecard.speed .play{color:var(--speed-dark)}
.modecard.locked{background:linear-gradient(135deg,#9AA0BE,#B4B9D2)}
.modecard.locked .play{color:var(--muted);opacity:.9}
.modecard .emoji{position:absolute;right:12px;bottom:6px;font-size:60px;opacity:.16}
.wsbtn{width:100%;background:var(--card);border:1.5px dashed var(--line);border-radius:16px;padding:14px;font-weight:800;color:var(--ink);display:flex;align-items:center;justify-content:center;gap:8px;font-size:14.5px}
/* practice sets */
.mastered-tag{display:inline-block;margin-top:8px;background:#FFF6E0;color:var(--gold-deep);font-family:var(--display);font-weight:600;font-size:14px;padding:4px 14px;border-radius:999px;border:1px solid #F3DFA8}
.sets-block{margin-top:6px}
.sets-head{font-family:var(--display);font-weight:600;font-size:17px;display:flex;align-items:center;gap:8px;margin:4px 2px}
.sets-count{margin-left:auto;font-size:14px;color:var(--muted);font-weight:700}
.sets-hint{color:var(--muted);font-weight:700;font-size:12.5px;margin:0 2px 12px}
.setgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
.setchip{background:var(--card);border:2px solid var(--line);border-radius:16px;padding:16px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:transform .12s,border-color .12s;text-align:left}
.setchip:not(.locked):active{transform:scale(.97)}
.setchip .setnum{width:38px;height:38px;flex:none;border-radius:11px;background:var(--brand);color:#fff;font-family:var(--display);font-weight:600;font-size:19px;display:grid;place-items:center}
.setchip.done .setnum{background:var(--good)}
.setchip.locked{opacity:.55;filter:grayscale(.4)}
.setchip.locked .setnum{background:var(--muted)}
.setchip .setstars{display:flex;gap:1px;flex:1}
.setchip .setmid{flex:1;display:flex;flex-direction:column;gap:3px}
.setchip .settime{font-family:var(--body);font-weight:800;font-size:11px;color:var(--muted)}
.setchip .setstars span{color:var(--line);font-size:15px}
.setchip .setstars span.on{color:var(--gold)}
.setchip .settick{color:var(--good);font-weight:800;font-size:18px}
.setchip .setlock{font-size:15px}
/* placement */
.place-tag{font-family:var(--display);font-weight:600;font-size:13px;color:var(--muted);background:#EEF3F9;border-radius:999px;padding:4px 14px;margin-bottom:10px}
.placed-skill{display:inline-flex;align-items:center;gap:10px;font-family:var(--display);font-weight:600;font-size:20px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:10px 18px;box-shadow:var(--shadow)}
.placed-skill .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px}
/* assessment result */
.assess-bar-wrap{margin:10px auto 22px;max-width:320px}
.assess-bar{height:12px;background:var(--line);border-radius:999px;overflow:hidden}
.assess-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--concept),var(--gold));border-radius:999px}
.assess-label{font-weight:800;font-size:13px;color:var(--muted);margin-top:8px}
.choice-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px 16px;margin-bottom:14px;box-shadow:var(--shadow);text-align:center}
.choice-card.rec{border:2px solid var(--gold);box-shadow:0 0 0 3px rgba(242,178,51,.18),var(--shadow)}
.choice-h{font-family:var(--display);font-weight:600;font-size:16px;color:var(--ink)}
.choice-skill{display:inline-flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:19px;margin:10px 0}
.choice-skill .ico{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:19px}
.choice-p{color:var(--muted);font-weight:700;font-size:13px;line-height:1.4;margin:6px 0 14px;max-width:300px;margin-left:auto;margin-right:auto}
.choice-card .btn{margin-bottom:0}
/* worksheet preview */
.ws-preview-head{text-align:center;margin:8px 0 14px}
.ws-preview-head h2{font-family:var(--display);font-weight:600;font-size:24px;margin:0}
.ws-preview-head .tag{color:var(--muted);font-weight:700;font-size:13px;margin-top:4px;max-width:320px;margin-left:auto;margin-right:auto}
.ws-sheet{background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.ws-sheet-title{font-family:var(--display);font-weight:600;font-size:15px;color:var(--brand)}
.ws-sheet-sub{color:var(--muted);font-weight:700;font-size:12.5px;margin:2px 0 12px;border-bottom:2px solid var(--line);padding-bottom:10px}
.ws-list{margin:0;padding-left:26px;columns:2;column-gap:26px}
.ws-list li{font-family:var(--display);font-weight:500;font-size:16px;margin-bottom:12px;break-inside:avoid}
.ws-actions{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.ws-actions .btn{margin-bottom:0}
/* reset zone */
.danger-zone{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:10px}
.danger-zone .btn{margin-bottom:0}
.danger-zone .danger{color:var(--bad);border-color:rgba(232,112,91,.4)}

/* ---------- Play (concept & speed) ---------- */
.play-wrap{display:flex;flex-direction:column;min-height:calc(100vh - 20px)}
.play-top{display:flex;align-items:center;gap:12px;padding:14px 16px 6px}
.play-top .x{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:18px;font-weight:800;color:var(--muted)}
.play-top .pbar{flex:1;height:12px;background:var(--line);border-radius:999px;overflow:hidden}
.play-top .pbar>i{display:block;height:100%;border-radius:999px;transition:width .35s ease}
.timer{font-family:var(--display);font-weight:600;font-size:19px;min-width:52px;text-align:right}
.play-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 18px 0}
.pm-skill{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-weight:600;font-size:14.5px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:6px 14px 6px 11px;box-shadow:var(--shadow)}
.pm-skill .pmi{font-size:16px}
.pm-name{display:inline-flex;align-items:center;gap:7px;font-weight:800;font-size:13px;color:var(--muted);max-width:45%;overflow:hidden}
.pm-name .lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm-name .av{width:26px;height:26px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:800;font-family:var(--display);flex:none}
.stage-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 18px;text-align:center}
.visual{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:18px;box-shadow:var(--shadow);width:100%;max-width:360px}
.strategy{font-size:13px;font-weight:700;color:var(--concept-dark);background:#E6FAF8;border-radius:10px;padding:8px 12px;margin:-6px auto 14px;max-width:340px}
.question{font-family:var(--display);font-weight:600;font-size:clamp(38px,13vw,58px);letter-spacing:-1px;line-height:1;margin:6px 0 4px;font-variant-numeric:tabular-nums}
.answerbox{font-family:var(--display);font-weight:600;font-size:clamp(38px,13vw,58px);color:var(--brand);min-height:1.1em;min-width:1.4em;border-bottom:4px solid var(--line);display:inline-block;padding:0 12px;font-variant-numeric:tabular-nums;transition:color .15s,border-color .15s}
.answerbox.good{color:var(--good);border-color:var(--good)}
.answerbox.bad{color:var(--bad);border-color:var(--bad)}
.feedback{height:26px;font-weight:800;font-size:16px;margin-top:8px}
.feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}

/* number pad */
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:10px 16px calc(16px + env(safe-area-inset-bottom))}
.key{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 0;font-family:var(--display);font-weight:600;font-size:26px;box-shadow:var(--shadow);transition:transform .08s}
.key:active{transform:scale(.94);background:#EEF3F9}
.key.wide{grid-column:span 1}
.key.enter{background:var(--brand);color:#fff;font-size:20px}
.key.enter.concept{background:var(--concept)} .key.enter.speed{background:var(--speed)}
.key.del{color:var(--bad);font-size:22px}

/* ---------- Result ---------- */
.result{text-align:center;padding:40px 24px}
.result .rico{font-size:64px;margin-bottom:6px;animation:pop .5s cubic-bezier(.2,1.4,.5,1)}
@keyframes pop{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
.result h2{font-family:var(--display);font-weight:600;font-size:30px;margin:6px 0 2px}
.result .rstars{font-size:40px;margin:12px 0;letter-spacing:6px}
.result .rstars span{filter:grayscale(1);opacity:.3;display:inline-block}
.result .rstars span.on{filter:none;opacity:1;animation:pop .4s backwards}
.result .rstars span.on:nth-child(2){animation-delay:.12s}
.result .rstars span.on:nth-child(3){animation-delay:.24s}
.rstats{display:flex;gap:12px;justify-content:center;margin:18px 0 26px}
.rstat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow)}
.rstat b{font-family:var(--display);font-weight:600;font-size:26px;display:block}
.rstat small{color:var(--muted);font-weight:700;font-size:12px}
.btn{width:100%;border-radius:16px;padding:15px;font-family:var(--display);font-weight:600;font-size:17px;box-shadow:var(--shadow);margin-bottom:10px}
.btn.primary{background:var(--brand);color:#fff}
.btn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}

/* ---------- Onboarding ---------- */
.onb{padding:60px 24px;text-align:center}
.onb .om{width:88px;height:88px;border-radius:26px;background:var(--brand);margin:0 auto 20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:12px}
.onb .om i{background:#fff;border-radius:50%}
.onb h1{font-family:var(--display);font-weight:600;font-size:32px;margin:0 0 6px;letter-spacing:-.5px}
.onb-pitch{max-width:320px;margin:2px auto 10px;background:#EAF1F8;border:1px solid #D6E2F0;border-radius:12px;padding:9px 14px;color:var(--brand);font-weight:800;font-size:13px;line-height:1.4}
.onb p{color:var(--muted);font-weight:700;margin:0 0 26px}
.field{width:100%;border:2px solid var(--line);border-radius:16px;padding:15px;font-size:17px;font-weight:800;text-align:center;font-family:var(--body);margin-bottom:14px;-webkit-user-select:text;user-select:text}
.field:focus{outline:none;border-color:var(--brand)}

/* ---------- Stats ---------- */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 20px}
.statbox{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:var(--shadow);text-align:center}
.statbox b{font-family:var(--display);font-weight:600;font-size:30px;display:block;line-height:1}
.statbox small{color:var(--muted);font-weight:700;font-size:12.5px}

/* ---------- Bottom nav ---------- */
.nav{position:fixed;bottom:0;left:0;right:0;max-width:520px;margin:0 auto;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:50}
.nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:800;font-size:11px;color:var(--muted);padding:4px}
.nav button.on{color:var(--brand)}
.nav button .ni{font-size:20px}

/* ---------- Worksheet (print) ---------- */
#ws{display:none}
@page{ size:A4; margin:14mm; }
@media print{
  body *{visibility:hidden}
  #ws,#ws *{visibility:visible}
  #ws{display:block!important;position:absolute;left:0;top:0;width:100%;padding:0}
  .nav{display:none!important}
}
#ws{padding:0;font-family:var(--body);color:#1F2A44;-webkit-print-color-adjust:exact;print-color-adjust:exact}
#ws .ws-page{position:relative}
#ws .ws-answers{page-break-before:always;break-before:page}
#ws .ws-head{border-bottom:3px solid var(--brand);padding-bottom:9px;margin-bottom:14px}
#ws .ws-eyebrow{font-family:var(--display);font-weight:600;font-size:12px;color:var(--brand);letter-spacing:2px;text-transform:uppercase}
#ws .ws-titlebar{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;margin-top:5px}
#ws .ws-app{font-weight:800;font-size:11px;color:#B8801E;letter-spacing:.6px;text-transform:uppercase}
#ws h1{font-family:var(--display);font-size:25px;font-weight:600;margin:2px 0 3px;color:var(--brand);line-height:1.1}
#ws .ws-skillsub{color:#555;font-weight:700;font-size:12.5px}
#ws .ws-score{border:2px solid var(--brand);border-radius:11px;padding:7px 16px;text-align:center;font-family:var(--display);color:var(--brand);white-space:nowrap}
#ws .ws-score span{display:block;font-size:9.5px;letter-spacing:1.2px;text-transform:uppercase;font-weight:800}
#ws .ws-score b{font-size:20px}
#ws .ws-keybadge{width:46px;height:46px;border-radius:50%;background:var(--brand);color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;font-weight:800}
#ws .ws-meta{display:flex;justify-content:space-between;align-items:center;gap:16px;font-weight:700;font-size:13px;color:#333;background:#FBF7EF;border:1px solid #E7DFCB;border-radius:9px;padding:10px 15px;margin-bottom:18px}
#ws .ws-meta .mname{flex:1}
#ws .ws-meta .mname i{display:inline-block;min-width:150px;border-bottom:1.5px solid #000;height:13px;vertical-align:middle;margin-left:4px}
#ws .ws-meta .mname .mnm{font-family:var(--display);font-weight:600;color:var(--brand);margin-left:2px}
#ws .ws-meta .ws-gen{color:#999;font-size:11px;font-weight:700}
#ws .qgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 28px}
#ws .qrow{font-family:var(--display);font-size:19px;display:flex;align-items:center;gap:11px;padding:9px 4px;border-bottom:1px dotted #ccc}
#ws .qrow .qn{background:var(--brand);color:#fff;font-family:var(--body);font-weight:800;font-size:12px;width:23px;height:23px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
#ws .qrow .qq{flex:0 1 auto}
#ws .qrow .blank{flex:1;border-bottom:2px solid #000;min-width:38px;margin-left:auto;max-width:82px;height:0}
#ws .agrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 28px;margin-top:2px}
#ws .arow{display:flex;align-items:center;gap:11px;font-size:15px;font-weight:700;padding:7px 4px;border-bottom:1px solid #eee;font-variant-numeric:tabular-nums}
#ws .arow .an{background:#EAF1F8;color:var(--brand);font-size:11px;width:21px;height:21px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto}
#ws .arow .aq{color:#666;flex:1}
#ws .arow .aa{color:var(--brand);font-weight:800;font-family:var(--display);font-size:17px}
#ws .ws-foot{margin-top:20px;border-top:1px solid #ccc;padding-top:8px;font-size:10.5px;color:#777;font-weight:700;text-align:center;letter-spacing:.3px}
.reduced{transition:none!important;animation:none!important}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

let _actx=null;
function beep(ok){ if(!cfg().sound)return; try{ _actx=_actx||new (window.AudioContext||window.webkitAudioContext)();  const o=_actx.createOscillator(),g=_actx.createGain(); o.connect(g); g.connect(_actx.destination);
  o.type='sine'; o.frequency.value=ok?680:200; g.gain.setValueAtTime(.07,_actx.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,_actx.currentTime+.16); o.start(); o.stop(_actx.currentTime+.16);
}catch(e){} }
/* in-app confirm (native confirm() is blocked in sandboxed/webview contexts) */
function uiConfirm(msg,onYes){
  const ov=document.createElement('div'); ov.className='modal-ov';
  ov.innerHTML=`<div class="modal"><div class="modal-msg">${msg}</div>
    <div class="modal-btns"><button class="btn ghost" id="mno">${t('cancel')}</button>
    <button class="btn primary" id="myes">${t('confirm')}</button></div></div>`;
  document.body.appendChild(ov);
  ov.querySelector('#mno').onclick=()=>ov.remove();
  ov.querySelector('#myes').onclick=()=>{ ov.remove(); onYes(); };
  ov.addEventListener('click',e=>{ if(e.target===ov)ov.remove(); });
}

/* ---- SVG visual models ---- */
function tenFrame(filled,total=10,extra=0){ // filled dots (blue), extra (orange, to add)
  const cells=[]; const cols=5, rows=Math.ceil(total/5);
  for(let i=0;i<total;i++){
    const c=i%5, r=Math.floor(i/5);
    let fill='#EAF1F8', stroke='#D6DEEA';
    if(i<filled){fill='var(--dot)';stroke='var(--dot)'}
    else if(i<filled+extra){fill='var(--speed)';stroke='var(--speed)'}
    cells.push(`<circle cx="${28+c*44}" cy="${26+r*44}" r="15" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`);
  }
  const w=5*44+12, h=rows*44+8;
  const grid=[];
  for(let r=0;r<rows;r++)for(let c=0;c<5;c++)grid.push(`<rect x="${8+c*44}" y="${6+r*44}" width="40" height="40" rx="9" fill="none" stroke="#E5E8F5" stroke-width="2"/>`);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-height:150px">${grid.join('')}${cells.join('')}</svg>`;
}

  </svg>`;
}
function numberLine(from,to,jumps){ // jumps: array of {a,b} arcs
  const lo=Math.min(from,to,...jumps.flatMap(j=>[j.a,j.b]));
  const hi=Math.max(from,to,...jumps.flatMap(j=>[j.a,j.b]));
  const pad=1, min=Math.max(0,lo-pad), max=hi+pad, span=max-min||1;
  const W=300, x=v=>14+((v-min)/span)*(W-28);
  const ticks=[]; for(let v=min;v<=max;v++){ticks.push(`<line x1="${x(v)}" y1="86" x2="${x(v)}" y2="94" stroke="#C4D0E0" stroke-width="2"/><text x="${x(v)}" y="112" text-anchor="middle" font-family="Nunito" font-size="12" font-weight="700" fill="#8B90B4">${v}</text>`)}
  const arcs=jumps.map((j,i)=>{const x1=x(j.a),x2=x(j.b),mx=(x1+x2)/2,dir=j.b>=j.a?-1:-1;
    return `<path d="M${x1} 88 Q ${mx} ${52} ${x2} 88" fill="none" stroke="var(--speed)" stroke-width="3" marker-end="url(#ah)"/>
    <text x="${mx}" y="46" text-anchor="middle" font-family="Fredoka" font-size="15" font-weight="600" fill="var(--speed-dark)">${j.b>j.a?'+':'−'}${Math.abs(j.b-j.a)}</text>`}).join('');
  return `<svg viewBox="0 0 300 120" width="100%" style="max-height:130px">
    <defs><marker id="ah" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="var(--speed)"/></marker></defs>
    <line x1="14" y1="90" x2="286" y2="90" stroke="#C4D0E0" stroke-width="3"/>${ticks.join('')}${arcs}</svg>`;
}
function baseTen(tens,ones){
  let s=''; let x=10;
  for(let i=0;i<tens;i++){ s+=`<rect x="${x}" y="18" width="14" height="72" rx="3" fill="var(--dot)" stroke="var(--brand-dark)" stroke-width="1.5"/>`;
    for(let d=1;d<10;d++)s+=`<line x1="${x}" y1="${18+d*7.2}" x2="${x+14}" y2="${18+d*7.2}" stroke="var(--brand-dark)" stroke-width="1" opacity=".4"/>`; x+=22; }
  x+=8; let ox=x, oy=18, cnt=0;
  for(let i=0;i<ones;i++){ s+=`<rect x="${ox+(cnt%5)*16}" y="${oy+Math.floor(cnt/5)*16}" width="12" height="12" rx="2.5" fill="var(--speed)" stroke="var(--speed-dark)" stroke-width="1.2"/>`; cnt++; }
  return `<svg viewBox="0 0 300 108" width="100%" style="max-height:130px">${s}</svg>`;
}
function groups(rows,per){ // array of dots
  let s=''; const r=11, gap=30, ox=(300-(per*gap))/2+gap/2;
  for(let R=0;R<rows;R++)for(let c=0;c<per;c++)s+=`<circle cx="${ox+c*gap}" cy="${24+R*30}" r="${r}" fill="${R%2?'var(--speed)':'var(--dot)'}"/>`;
  const h=rows*30+16;
  return `<svg viewBox="0 0 300 ${h}" width="100%" style="max-height:150px">${s}</svg>`;
}
function arrayModel(rows,cols){ // scalable rows×cols array for multiplication (row = one group)
  const W=300, maxH=150, pad=8;
  const gap=Math.min(30,(W-2*pad)/cols);
  const rad=Math.max(4.5,Math.min(11,gap*0.36));
  const gapY=Math.min(gap,(maxH-24)/rows);
  const gridW=cols*gap, ox=(W-gridW)/2+gap/2, oy=12+gapY/2;
  let s='';
  for(let R=0;R<rows;R++)for(let c=0;c<cols;c++)
    s+=`<circle cx="${ox+c*gap}" cy="${oy+R*gapY}" r="${rad}" fill="${R%2?'var(--speed)':'var(--dot)'}"/>`;
  const h=rows*gapY+24;
  return `<svg viewBox="0 0 ${W} ${h}" width="100%" style="max-height:${maxH}px">${s}</svg>`;
}
function fractionOfSet(m,n){ // m items split into n equal groups; highlight one group (= 1/n of m)
  const k=Math.round(m/n), W=300, pad=10, gap=8, bh=70;
  const gw=(W-2*pad-(n-1)*gap)/n;
  const cols=Math.ceil(Math.sqrt(k)), rows=Math.ceil(k/cols);
  const cellW=gw/cols, cellH=bh/rows;
  const rad=Math.max(4,Math.min(9,Math.min(cellW,cellH)/2-3));
  let s='';
  for(let g=0;g<n;g++){
    const bx=pad+g*(gw+gap), on=(g===0);
    s+=`<rect x="${bx}" y="10" width="${gw}" height="${bh}" rx="10" fill="${on?'rgba(74,168,224,.16)':'#F4F6FB'}" stroke="${on?'var(--brand)':'#D6DEEA'}" stroke-width="${on?2.5:1.5}"${on?'':' stroke-dasharray="4 4"'}/>`;
    for(let i=0;i<k;i++){ const c=i%cols, r=Math.floor(i/cols);
      s+=`<circle cx="${bx+c*cellW+cellW/2}" cy="${10+r*cellH+cellH/2}" r="${rad}" fill="${on?'var(--dot)':'#C4D0E0'}"/>`; }
  }
  return `<svg viewBox="0 0 ${W} 90" width="100%" style="max-height:120px">${s}</svg>`;
}
function placeChart(th,h,te,o){ // place-value chart: Th | H | T | O columns
  const cols=[['Th',th,'#8B6CE0'],['H',h,'#4AA8E0'],['T',te,'#3FBFA3'],['O',o,'#F2884B']];
  const cw=62, gap=8, ox=14; let s='';
  cols.forEach((col,i)=>{ const lab=col[0], val=col[1], c=col[2], x=ox+i*(cw+gap);
    s+=`<rect x="${x}" y="8" width="${cw}" height="26" rx="7" fill="${c}"/>`;
    s+=`<text x="${x+cw/2}" y="21" text-anchor="middle" dominant-baseline="central" font-family="Nunito" font-size="13" font-weight="800" fill="#fff">${lab}</text>`;
    s+=`<rect x="${x}" y="40" width="${cw}" height="58" rx="9" fill="${c}" fill-opacity="0.10" stroke="${c}" stroke-width="2"/>`;

  });
  return `<svg viewBox="0 0 300 106" width="100%" style="max-height:130px">${s}</svg>`;
}
function hundredGrid(pct){ // 10×10 grid, `pct` cells shaded = the percentage
  const W=300, cs=22, ox=(W-10*cs)/2, oy=6; let s='';
  for(let r=0;r<10;r++)for(let c=0;c<10;c++){ const on=(r*10+c)<pct;
    s+=`<rect x="${ox+c*cs}" y="${oy+r*cs}" width="${cs-2}" height="${cs-2}" rx="3" fill="${on?'var(--brand)':'#EAF1F8'}" stroke="#D6DEEA" stroke-width="1"/>`;
  }
  const h=oy+10*cs+6;
  return `<svg viewBox="0 0 ${W} ${h}" width="100%" style="max-height:190px">${s}</svg>`;
}
function estLine(n,r,lo,hi){ // lightweight estimation number line (endpoints + value marker + rounded)
  const W=300, x=v=>20+((v-lo)/((hi-lo)||1))*260;

function resolveIdentity(){
  try{ if(window.NS_STUDENT && window.NS_STUDENT.name)
        return {id:String(window.NS_STUDENT.id||''), name:String(window.NS_STUDENT.name)}; }catch(e){}
  try{ const p=new URLSearchParams(location.search);
        if(p.get('name')) return {id:p.get('sid')||'', name:p.get('name')}; }catch(e){}
  const saved=store.get('ns_ident'); if(saved){ try{return JSON.parse(saved)}catch(e){} }
  return null;
}

  if(st.learn===undefined)st.learn=false;

  if(st.plays===undefined)st.plays=0;

function setOpen(st,j){ return st.learn && (j===0 || st.sets[j-1].done); }
function levelInfo(){ const lvl=Math.floor(S.xp/100)+1, into=S.xp%100; return {lvl,into,need:100} }
function touchStreak(){ const d=new Date().toDateString(); if(S.lastDay!==d){ const y=new Date(Date.now()-864e5).toDateString(); S.streak = (S.lastDay===y)?S.streak+1:1; S.lastDay=d; saveState(); } }
function unlocked(i){ if(cfg().unlockAll)return true;
  if(i===0)return true;
  if(S.placedUpTo!=null && i<=S.placedUpTo+1)return true;
  const p=skState(SKILLS[i-1].id); return p.learn || setsDone(p)>=1; }

/* ============ ROUTER ============ */
const app = document.getElementById('app');
let route = {name:'home'};
function go(name,data={}){ route={name,...data}; window.scrollTo(0,0); render(); }

function render(){
  if(!IDENT){ return route.name==='help' ? renderHelp() : renderOnboard(); }
  touchStreak();
  const r=route.name;
  if(r==='home') renderHome();
  else if(r==='placeIntro') renderPlaceIntro();
  else if(r==='skill') renderSkill(route.id);
  else if(r==='play') renderPlay();
  else if(r==='result') renderResult();
  else if(r==='worksheet') renderWorksheet(route.id);
  else if(r==='help') renderHelp();
  else if(r==='settings') renderSettings();
  else if(r==='stats') renderStats();
}

/* ---------- PLAY ---------- */
let game=null;
function renderPlay(){
  const s=skById(route.id), mode=route.mode;
  const accent = mode==='learn'?'concept':(mode==='placement'?'concept':'speed');
  const dpKey = (mode==='placement') || !!s.dp;   // show a decimal-point key for decimal skills
  game={ s, mode, setIdx:route.setIdx||0, i:0, correct:0, wrong:0, input:'', cur:null,
         total:(mode==='learn'?8:(mode==='set'?SZ():SKILLS.length)),
         startT:Date.now(), ended:false, recent:[],
         pIdx:0, pWrongStreak:0, pLastCorrect:-1 };
  const metaSkill = mode==='placement' ? t('placement_title') : s.nm[LANG]+' · '+t('set')+' '+(game.setIdx+1);
  app.innerHTML=`
  <div class="play-wrap">
    <div class="play-top">
      <button class="x" id="qx">✕</button>
      <div class="pbar"><i id="pb" style="width:0%;background:var(--${accent})"></i></div>
      <div class="timer" id="tm" style="color:var(--${accent==='concept'?'concept-dark':'speed-dark'})">0/${game.total}</div>
    </div>
    <div class="play-meta">
      <span class="pm-skill"><span class="pmi">${mode==='placement'?'✏️':s.ico}</span>${metaSkill}</span>
      <span class="pm-name"><img class="bud" src="${buddyById(S.buddy).img}" alt=""><span class="lbl">${S.name||''}</span></span>
    </div>
    <div class="stage-area" id="stage"></div>
    <div class="pad" id="pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="key" data-k="${n}">${n}</button>`).join('')}
      ${dpKey
        ? `<button class="key" data-k=".">.</button>
      <button class="key" data-k="0">0</button>
      <button class="key del" data-k="del">⌫</button>
      <button class="key enter ${accent}" data-k="enter" style="grid-column:1 / -1">↵</button>`
        : `<button class="key del" data-k="del">⌫</button>
      <button class="key" data-k="0">0</button>
      <button class="key enter ${accent}" data-k="enter">↵</button>`}
    </div>
  </div>`;
  document.getElementById('qx').onclick=()=>{ stopTimer(); go(mode==='placement'?'home':'skill',{id:s.id}); };
  document.getElementById('pad').querySelectorAll('[data-k]').forEach(b=>b.onclick=()=>press(b.dataset.k));
  window.onkeydown=e=>{ if(route.name!=='play')return; if(/^[0-9]$/.test(e.key))press(e.key); else if(e.key==='.'&&dpKey)press('.'); else if(e.key==='Enter')press('enter'); else if(e.key==='Backspace')press('del'); };
  game.timed = (mode==='set' && cfg().timed);
  if(game.timed){ const tm=document.getElementById('tm'); game.timer=setInterval(()=>{ const el=Math.floor((Date.now()-game.startT)/1000); if(tm)tm.textContent=`${Math.floor(el/60)}:${String(el%60).padStart(2,'0')}`; },500); }
  nextQ();
}
function stopTimer(){ if(game&&game.timer){clearInterval(game.timer);game.timer=null} window.onkeydown=null; }
function nextQ(){
  const mode=game.mode;
  const genOne=()=> (mode==='placement') ? SKILLS[game.pIdx].gen(1) : game.s.gen(mode==='learn'?0:game.setIdx);
  let it=genOne(), tries=0;
  while(tries++<30 && game.recent.includes(it.qt)) it=genOne();   // avoid recent repeats
  game.cur=it;
  game.recent.push(it.qt); if(game.recent.length>3)game.recent.shift();
  game.input='';
  const s=game.s;
  const stage=document.getElementById('stage');
  stage.innerHTML=`
    ${mode==='learn'?`<div class="visual">${game.cur.model}</div>${cfg().hints?`<div class="strategy">💡 ${s.strat[LANG]}</div>`:''}`:''}
    ${mode==='placement'?`<div class="place-tag">${SKILLS[game.pIdx].nm[LANG]}</div>`:''}
    <div class="question">${game.cur.q}</div>
    <div class="answerbox" id="ans">&nbsp;</div>
    <div class="feedback" id="fb"></div>`;
  updateProgress();
}
function press(k){
  if(game.ended)return;
  const ansEl=document.getElementById('ans');
  const dec=!!(game.cur&&game.cur.dec);
  if(k==='del'){ game.input=game.input.slice(0,-1); }
  else if(k==='enter'){ if(game.input==='')return; return check(); }
  else if(k==='.'){ if(game.input.includes('.'))return; if(game.input==='')game.input='0'; game.input+='.'; }
  else { if(game.input.length>=(dec?5:4))return; game.input+=k; }
  ansEl.textContent = game.input===''?'\u00A0':game.input;
  ansEl.className='answerbox';
  if(!dec && (game.mode==='set'||game.mode==='placement') && game.input.length>=String(game.cur.a).length){ check(); }
}
function check(){
  const ansEl=document.getElementById('ans'), fb=document.getElementById('fb');
  const dec=!!(game.cur&&game.cur.dec);
  const val=dec?parseFloat(game.input):parseInt(game.input,10);
  const ok=dec?(isFinite(val)&&Math.abs(val-game.cur.a)<1e-9):(val===game.cur.a), mode=game.mode;
  beep(ok);
  if(mode==='learn'){
    if(ok){ ansEl.className='answerbox good'; fb.className='feedback good'; fb.textContent=pick([t('correct'),t('nice'),t('great')]);
      game.correct++; game.i++; updateProgress();
      if(game.i>=game.total){ setTimeout(endGame,650); return; }
      setTimeout(nextQ,650);
    } else { ansEl.className='answerbox bad'; fb.className='feedback bad'; fb.textContent=t('almost'); game.wrong++;
      setTimeout(()=>{ game.input=''; ansEl.textContent='\u00A0'; ansEl.className='answerbox'; fb.textContent=''; },1100); }
    return;
  }
  if(mode==='placement'){
    if(ok){ ansEl.className='answerbox good'; fb.className='feedback good'; fb.textContent='✓'; game.pLastCorrect=game.pIdx; game.pWrongStreak=0; }
    else { ansEl.className='answerbox bad'; fb.className='feedback bad'; fb.textContent='✗'; game.pWrongStreak++; }
    game.pIdx++; game.i++; updateProgress();
    if(game.pIdx>=SKILLS.length || game.pWrongStreak>=2){ setTimeout(endGame,500); return; }
    setTimeout(nextQ,500); return;
  }
  // set
  if(ok){ ansEl.className='answerbox good'; fb.className='feedback good'; fb.textContent=pick([t('correct'),t('nice'),t('great')]); game.correct++; }
  else { ansEl.className='answerbox bad'; fb.className='feedback bad'; fb.textContent='✗ '+game.cur.a; game.wrong++; }
  game.i++; updateProgress();
  if(game.i>=SZ()){ setTimeout(endGame,ok?260:640); return; }
  setTimeout(nextQ,ok?240:640);
}
function updateProgress(){
  const pb=document.getElementById('pb'), tm=document.getElementById('tm');
  const denom = game.mode==='learn'?game.total:(game.mode==='set'?SZ():game.total);
  if(pb)pb.style.width=(game.i/denom*100)+'%';
  if(tm && !game.timed)tm.textContent=`${game.i}/${denom}`;
}
function endGame(){
  if(game.ended)return; game.ended=true; stopTimer();
  const s=game.s, mode=game.mode;
  if(mode==='placement'){
    const up=game.pLastCorrect;                 // highest skill answered correctly
    S.xp+=20; saveState();                        // recommendation only — unlocks applied by the user's choice
    go('result',{mode:'placement',placedUpTo:up});
    return;
  }
  const st=skState(s.id); st.plays++;
  let stars=0, xp=0, correct=game.correct;
  if(mode==='learn'){ st.learn=true; xp=30; go('result',{id:s.id,mode:'learn',xp}); saveState(); return; }
  // set
  const size=SZ();
  if(correct>=Math.ceil(size*0.9))stars=3; else if(correct>=Math.ceil(size*0.75))stars=2; else if(correct>=Math.ceil(size*0.58))stars=1;
  const done = correct>=Math.ceil(size*0.58);
  const secs = Math.round((Date.now()-game.startT)/1000);
  const set=st.sets[game.setIdx];
  const wasDone=set.done;
  set.stars=Math.max(set.stars,stars); set.best=Math.max(set.best,correct); if(done)set.done=true;
  set.bestTime = set.bestTime ? Math.min(set.bestTime,secs) : secs;
  xp = correct*3 + stars*8 + (done&&!wasDone?12:0);
  S.xp+=xp; saveState();
  const mastered = !wasDone && skillMastered(st);
  go('result',{id:s.id,mode:'set',setIdx:game.setIdx,stars,xp,correct,wrong:game.wrong,done,mastered,secs,bestTime:set.bestTime});
}

/* ---------- Result ---------- */

    app.innerHTML=`<div class="screen" style="padding-top:20px"><div class="result">
      <img class="rbuddy" src="${buddyById(S.buddy).img}" alt="">
      <div class="rico">🎯</div>
      <h2>${t('assess_done')}</h2>
      <div class="assess-bar-wrap"><div class="assess-bar"><i style="width:${pct}%"></i></div>

      <div class="choice-card">
        <div class="choice-h">🧱 ${t('choice_begin_h')}</div>
        <div class="choice-p">${t('choice_begin_p')}</div>
        <button class="btn ghost" id="chBegin">${t('choice_begin_btn')}</button>
      </div>

    document.getElementById('chRec').onclick=()=>{
      S.placedUpTo=up; for(let k=0;k<=up;k++){ skState(SKILLS[k].id).learn=true; } saveState();

      go('skill',{id:SKILLS[0].id});
    };

  }
  const s=skById(route.id), st=skState(s.id), learn=mode==='learn';
  const total=route.correct+route.wrong, acc=total?Math.round(route.correct/total*100):100;
  const nextIdx=route.setIdx+1, hasNext=!learn&&nextIdx<SC();
  app.innerHTML=`<div class="screen" style="padding-top:20px">
    <div class="result">
      <img class="rbuddy" src="${buddyById(S.buddy).img}" alt="">
      <div class="rico">${learn?'🎉':(route.mastered?'🏅':(route.stars>=2?'🏆':'⚡'))}</div>
      <h2>${learn?t('learn_done'):(route.mastered?t('mastered'):t('set')+' '+(route.setIdx+1)+' '+t('complete'))}</h2>
      <div style="color:var(--muted);font-weight:800;margin-top:2px">${learn?t('learn_done_sub'):s.nm[LANG]}</div>
      ${learn?`<div class="rstars"><span class="on">⭐</span></div>`:`<div class="rstars">${[1,2,3].map(n=>`<span class="${route.stars>=n?'on':''}">⭐</span>`).join('')}</div>`}
      ${!learn?`<div class="rstats">
        <div class="rstat"><b>${route.correct}/${SZ()}</b><small>${t('score')}</small></div>
        <div class="rstat"><b>${acc}%</b><small>${t('accuracy')}</small></div>
        <div class="rstat"><b>${fmtTime(route.secs)}</b><small>${t('time')}${route.bestTime&&route.bestTime<route.secs?` · ${t('best')} ${fmtTime(route.bestTime)}`:''}</small></div>
      </div>`:`<div style="height:12px"></div>`}
      <div style="font-family:var(--display);font-weight:600;color:var(--gold-deep);font-size:20px;margin-bottom:20px">+${route.xp} XP</div>
      ${learn
        ? `<button class="btn primary" id="toset">🎯 ${t('start_set')} 1</button>`
        : hasNext
          ? `<button class="btn primary" id="next">▶ ${t('set')} ${nextIdx+1}</button><button class="btn ghost" id="again">🔁 ${t('again')}</button>`
          : `<button class="btn primary" id="again">🔁 ${t('again')}</button>`}
      <button class="btn ghost" id="hm">${t('back_to_skill')}</button>
    </div>
  </div>`;
  const toset=document.getElementById('toset'); if(toset)toset.onclick=()=>go('play',{id:s.id,mode:'set',setIdx:0});
  const nx=document.getElementById('next'); if(nx)nx.onclick=()=>go('play',{id:s.id,mode:'set',setIdx:nextIdx});
  const ag=document.getElementById('again'); if(ag)ag.onclick=()=>go('play',{id:s.id,mode:'set',setIdx:route.setIdx});
  document.getElementById('hm').onclick=()=>go('skill',{id:s.id});
}

    g.querySelectorAll('.seg-b').forEach(btn=>btn.onclick=()=>{ cfg()[key]=+btn.dataset.val; saveState(); beep(true); renderSettings(); }); });

  app.querySelectorAll('.switch').forEach(sw=>{ const key=sw.dataset.tog;

/* ---------- Worksheet: in-app preview + print ---------- */
let wsItems=[];
function buildWsItems(id){ const s=skById(id), N=cfg().wsCount, items=[], seen=new Set(); let g=0;
  // sweep all difficulty levels to gather the widest set of unique questions, then order easy → hard
  while(items.length<N && g++<3000){ const lvl=g%4; const it=s.gen(lvl);
    if(!seen.has(it.qt)){seen.add(it.qt); it._lvl=lvl; items.push(it)} }
  items.sort((a,b)=>a._lvl-b._lvl);
  return items; }
function renderWorksheet(id){
  const s=skById(id);
  wsItems=buildWsItems(id);
  app.innerHTML=`${header()}<div class="screen">
    <button class="back" id="bk">‹ ${t('back')}</button>
    <div class="ws-preview-head">
      <h2>${s.nm[LANG]}</h2>
      <div class="tag">${t('ws_intro')}</div>
    </div>
    <div class="ws-sheet" id="wssheet">
      <div class="ws-sheet-title">${BRAND.org} — ${t('ws_title')}</div>
      <div class="ws-sheet-sub">${s.nm[LANG]} · ${s.sub[LANG]} · ${t('generated')} ${new Date().toLocaleDateString('en-AU')}</div>
      <ol class="ws-list">
        ${wsItems.map(it=>`<li>${it.qt.replace('___','_____')}</li>`).join('')}
      </ol>
    </div>
    <div class="ws-actions">
      <button class="btn primary" id="print">🖨️ ${t('print')}</button>
      <button class="btn ghost" id="regen">🔀 ${t('new_set')}</button>
    </div>
  </div>`;
  document.getElementById('bk').onclick=()=>go('skill',{id});
  document.getElementById('regen').onclick=()=>renderWorksheet(id);
  document.getElementById('print').onclick=()=>doPrint(id,wsItems);
  bindHeader();
}

  const d=new Date(), gen=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  const stageName=STAGE_META[s.stage]||('Stage '+s.stage);
  const foot=`${BRAND.org} — ${BRAND.motto}.<br>${BRAND.tag} · ${gen}<br>© ${YEAR} ${BRAND.org} · Aligned to NSW Mathematics K–10 Syllabus (2022) · Report errors: ${BRAND.contact}`;
  const qrows=items.map((it,i)=>`<div class="qrow"><span class="qn">${i+1}</span><span class="qq">${it.qt.replace('___','')}</span><span class="blank"></span></div>`).join('');
  const arows=items.map((it,i)=>`<div class="arow"><span class="an">${i+1}</span><span class="aq">${it.qt.replace('___','')}</span><span class="aa">${it.a}</span></div>`).join('');
  ws.innerHTML=`
  <section class="ws-page">
    <div class="ws-head">
      <div class="ws-eyebrow">${BRAND.org}</div>
      <div class="ws-titlebar">
        <div>
          <div class="ws-app">${BRAND.app} · ${t('ws_title')}</div>
          <h1>${s.nm[LANG]}</h1>
          <div class="ws-skillsub">${s.sub[LANG]} · Stage ${s.stage} · NSW Maths K–10: ${nswOf(s.id).a} (${nswOf(s.id).c})</div>
        </div>
        <div class="ws-score"><span>${t('score')}</span><b>&nbsp;/ ${items.length}</b></div>
      </div>
    </div>
    <div class="ws-meta">
      <span class="mname">${t('ws_name')} ${S.name?`<b class="mnm">${S.name}</b>`:'<i></i>'}</span>
      <span>${t('ws_date')} ____ / ____ / ______</span>
      <span class="ws-gen">${t('generated')}: ${gen}</span>
    </div>
    <div class="qgrid">${qrows}</div>
    <div class="ws-foot">${foot}</div>
  </section>
  <section class="ws-page ws-answers">
    <div class="ws-head">
      <div class="ws-eyebrow">${BRAND.org}</div>
      <div class="ws-titlebar">
        <div>
          <div class="ws-app">${BRAND.app} · ${t('answer_key')}</div>
          <h1>${s.nm[LANG]} — ${t('answers')}</h1>
          <div class="ws-skillsub">${S.name?S.name+' · ':''}${s.sub[LANG]} · NSW ${nswOf(s.id).c} · ${t('generated')}: ${gen}</div>
        </div>
        <div class="ws-keybadge">✓</div>
      </div>
    </div>
    <div class="agrid">${arows}</div>
    <div class="ws-foot">${foot}</div>
  </section>`;
  window.print();
}
